name: 🟢 功能建议 (Feature Request)
description: 为 BASpark 提出新功能或改进建议
title: "[Feature]: "
labels: ["feature"]
assignees: []

body:
  - type: checkboxes
    id: check-list
    attributes:
      label: 注意事项
      description: 提交前请检查以下事项
      options:
        - label: 我已经确认这是针对 BASpark 程序的功能请求。
        - label: 我已经搜索了已有的 Issue，确认没有重复的建议。
        - label: 我已经尽可能详细地描述了该功能对用户的帮助。

  - type: markdown
    attributes:
      value: |
        感谢您提出改进建议！一个好的功能描述能帮助我们更快地评估开发计划。

  - type: dropdown
    id: feature-category
    attributes:
      label: 建议类别
      description: 该功能主要属于哪一方面？
      options:
        - 粒子特效 (更多样式/颜色)
        - 交互体验 (点击反馈/快捷键)
        - 控制面板 (UI 改进/设置项)
        - 性能优化 (内存/CPU 占用)
        - 其他
    validations:
      required: true

  - type: textarea
    id: feature-description
    attributes:
      label: 您希望添加什么功能？
      description: 请详细描述该功能，它能解决什么问题或提升什么体验。
      placeholder: 例如：我希望添加一种“烟花”样式的粒子，在双击时触发...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 场景描述 (可选)
      description: 在什么样的情况下你会用到这个功能？
      placeholder: 当我在打游戏/写代码时，希望粒子能根据我的点击速度改变亮度...
    validations:
      required: false

  - type: textarea
    id: visual-reference
    attributes:
      label: 视觉参考 (可选)
      description: 如果你有参考图或草图，请粘贴在这里。
      placeholder: 请将图片粘贴或拖拽到这里
    validations:
      required: false

  - type: textarea
    id: proposed-solution
    attributes:
      label: 实现思路 (可选)
      description: 如果您有关于如何实现它的想法（如技术实现、UI 布局等），请告诉我们。
    validations:
      required: false